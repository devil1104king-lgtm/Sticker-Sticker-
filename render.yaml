services:
  - type: web
    name: sticker-game-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web:app & python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8080
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
        
